name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: axeon-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: axeon-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: axeon-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: axeon-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            binary: axeon-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Add cross targets
        if: matrix.os == 'ubuntu-latest'
        run: |
          rustup target add ${{ matrix.target }}

      - name: Build
        run: |
          cargo build --release --bin axeon --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: target/${{ matrix.target }}/release/axeon${{ matrix.os == 'windows-latest' && '.exe' || '' }}